SOLVER:
  gpu: 0,
  run: train

  logdir: logs/fractal/v5
  max_epoch: 500
  test_every_epoch: 10
  log_per_iter: 50
  ckpt_num: 10
  port: 10001

  # optimizer
  type: adamw
  weight_decay: 0.01
  lr: 0.0001
  rand_seed: 42
  use_amp: True

  # learning rate
  lr_type: constant
  step_size: (160,240)

  # mesh extraction
  resolution: 256
  sdf_scale: 0.9


DATA:
  train:
    name: &name shapenet


    # octree building
    depth: &depth 6
    full_depth: &full_depth 1
    points_scale: &points_scale 0.5    # original data in [-0.5, 0.5]

    # sdf & surface samples
    volume_sample_num: &volume_sample_num 10000
    surface_sample_num: &surface_sample_num 10000
    max_points: &max_points 120000
    tsdf: &tsdf 0.05

    # no data augmentation
    distort: &distort False

    # data loading
    location: &location data/ShapeNet/datasets_256_test
    filelist: data/ShapeNet/filelist/train_airplane.txt
    load_pointcloud: True
    load_sdf: False
    batch_size: 8
    shuffle: True
    num_workers: 4
    pin_memory: False

  test:
    name: *name

    # octree building
    depth: *depth
    full_depth: *full_depth
    points_scale: *points_scale

    # sdf & surface samples
    volume_sample_num: *volume_sample_num
    surface_sample_num: *surface_sample_num
    max_points: *max_points
    tsdf: *tsdf

    # no data augmentation
    distort: *distort

    # data loading
    location: *location
    filelist: data/ShapeNet/filelist/test_airplane.txt
    load_pointcloud: True
    load_sdf: False
    batch_size: 4
    shuffle: False
    num_workers: 4
    pin_memory: False
    sdf_scale: 0.9



MODEL:
  depth: *depth
  full_depth: *full_depth
  depth_stop: 4
  find_unused_parameters: True

  FractalGen:
    feature_dim: 384
    full_depth: 1
    depth_stop: 4

    expander_num_heads: 4

    focal_alpha: 0.75
    focal_gamma: 2.0

    occ_threshold: 0.65
    occ_band: 0.05

    occ_weight: 1.0
    alive_weight: 0.1
    rate_weight: 0.1

    num_freqs: 6
    pos_emb_scale: 1.0

    latent_dim: 64
    global_max_points: 2048
    noise_std: 1.0

    context_drop_prob: 0.5
    film_scale: 0.1
